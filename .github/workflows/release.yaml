name: Release Checks

on:
  push:
    branches-ignore: [master]

env:
  AWS_DEFAULT_REGION: eu-central-1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.get-changed-packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Get Changed Packages
        id: get-changed-packages
        run: |
          set -euo pipefail

          base_ref="origin/master"
          changed_files="$(git diff --name-only --diff-filter=d "${base_ref}...${{ github.sha }}" -- src/)"

          packages="$(
            printf '%s\n' "$changed_files" \
              | awk -F/ '$1 == "src" && $2 != "" { print $2 }' \
              | sort -u \
              | jq -rcnR '[inputs | select(length > 0)]'
          )"

          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.check.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - if: ${{ matrix.package != 'helper' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - if: ${{ matrix.package != 'helper' }}
        name: Validate
        working-directory: src/${{ matrix.package }}
        run: sam validate

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, validate]
    strategy:
      matrix:
        package: ${{ fromJSON(needs.check.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - if: ${{ matrix.package != 'helper' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - if: ${{ matrix.package != 'helper' }}
        name: Build
        working-directory: ./src/${{ matrix.package }}
        run: sam build --use-container
